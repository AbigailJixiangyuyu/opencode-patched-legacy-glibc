name: Build legacy-glibc package

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  SOURCE_REPO: https://github.com/AbigailJixiangyuyu/opencode.git
  SOURCE_BRANCH: patched-main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo C
        uses: actions/checkout@v5

      - name: Get source info from repo A
        id: source_info
        run: |
          rm -rf source_repo
          git clone --depth 1 --branch "$SOURCE_BRANCH" "$SOURCE_REPO" source_repo

          SHA=$(git -C source_repo rev-parse HEAD)
          UPSTREAM_TAG=$(git -C source_repo log -n 20 --pretty=%B | sed -n 's/^UPSTREAM_TAG=//p' | head -n 1)

          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Failed to find UPSTREAM_TAG in repo A"
            exit 1
          fi

          RELEASE_TAG="${UPSTREAM_TAG}-cjk-legacy-glibc"

          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          echo "Source SHA: $SHA"
          echo "Upstream tag: $UPSTREAM_TAG"
          echo "Release tag: $RELEASE_TAG"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.source_info.outputs.release_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Stop if already built
        if: steps.check_release.outputs.exists == 'true'
        run: echo "This upstream version is already built."

      - name: Export package from Docker build
        if: steps.check_release.outputs.exists != 'true'
        run: |
          rm -rf dist
          mkdir -p dist

          docker build \
            -f build/legacy-glibc/Dockerfile \
            --target export \
            --build-arg REPO_URL=${SOURCE_REPO} \
            --build-arg REF=${SOURCE_BRANCH} \
            --output type=local,dest=dist \
            .

          tar -czf opencode-${{ steps.check_release.outputs.tag }}-linux-x64.tar.gz -C dist opencode

      - name: Create release
        if: steps.check_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat <<EOF
Built from repo A: ${SOURCE_BRANCH} @ ${{ steps.source_info.outputs.sha }}
Upstream version: ${{ steps.source_info.outputs.upstream_tag }}
EOF
)
          gh release create "${{ steps.check_release.outputs.tag }}" \
            "opencode-${{ steps.check_release.outputs.tag }}-linux-x64.tar.gz" \
            --title "${{ steps.check_release.outputs.tag }}" \
            --notes "$NOTES"